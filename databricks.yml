bundle:
  name: arango-mcp-app

include:
  - resources/*.yml

variables:
  # Optional: use with ``databricks bundle deploy`` / CI. ``./deploy_app.sh`` uses ``app.yaml`` defaults.
  sql_warehouse_id:
    description: "Databricks SQL warehouse id (hex) — set via bundle --var, env, or parent arango-platform-bundle (no default)."
    default: ""
  arango_gateway_base_url:
    description: "Optional deployed arango-gateway-app URL (https://....cloud.databricksapps.com)"
    default: ""
  arango_registry_table:
    default: "workspace.default.arango_connection_registry"
  arango_gateway_registry_table:
    default: "workspace.default.arango_gateway_registry"

targets:
  dev:
    default: true
    mode: development
