name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --with dev --no-interaction

      - name: Ruff check
        run: poetry run ruff check .

      - name: Ruff format check
        run: poetry run ruff format --check .

      - name: Mypy type check
        run: poetry run mypy --ignore-missing-imports --no-error-summary --namespace-packages --explicit-package-bases --disable-error-code=union-attr --disable-error-code=no-any-return --disable-error-code=no-untyped-def --disable-error-code=call-arg --disable-error-code=arg-type --disable-error-code=operator --disable-error-code=assignment src/arango_mcp

  test:
    name: Test (Python ${{ matrix.python-version }}, ArangoDB ${{ matrix.arango-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
        arango-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --with dev --no-interaction

      - name: Run tests
        env:
          ARANGO_IMAGE: arangodb/arangodb:${{ matrix.arango-version }}
          ARANGO_TEST_TIMEOUT: "120"
          ENABLE_JS_TRANSACTIONS: "true"
        run: >-
          poetry run pytest tests/ -v
          --ignore=tests/test_cluster.py
          --cov=arango_mcp
          --cov-report=term-missing
